name: Nexus Runtime CI

on:
  push:
    branches:
      - main
      - canonical-evidence
      - v2300-cli
  pull_request:

permissions:
  contents: read

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install test and packaging tools
        run: python -m pip install --upgrade pip build pytest

      - name: Install project
        run: python -m pip install -e .

      - name: Validate Python syntax
        run: python -m compileall .

      - name: Validate distributed module imports
        run: >
          python -c "import persistence;
          import network_mesh;
          import heartbeat;
          import rate_limiter;
          import cluster_state;
          import nexus_v500_core;
          print('Distributed modules imported successfully.')"

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Validate wheel installation
        shell: pwsh
        run: |
          python -m venv .venv-ci
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1

          if (-not $wheel) {
              throw "No wheel was generated in dist."
          }

          & ".\.venv-ci\Scripts\python.exe" -m pip install $wheel.FullName

          Set-Location $env:TEMP

          & "$env:GITHUB_WORKSPACE\.venv-ci\Scripts\nexus.exe" version
          & "$env:GITHUB_WORKSPACE\.venv-ci\Scripts\nexus.exe" doctor