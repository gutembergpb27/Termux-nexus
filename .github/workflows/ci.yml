name: Nexus Runtime CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validate code formatting and syntax
      run: |
        python -m compileall .

    - name: Execute core integrity sanity check
      run: |
        # Testa se todos os novos módulos distribuídos importam perfeitamente sem quebrar sintaxe
        python -c "import persistence; import network_mesh; import heartbeat; import rate_limiter; import cluster_state; import nexus_v500_core; print('🎉 Todos os módulos da v1200 integrados com sucesso no CI!')"
